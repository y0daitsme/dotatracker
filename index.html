<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DotaPick — 127 Heroes · Patch 7.40c · March 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--bg2:#0a0d1a;--bg3:#0e1225;--bg4:#141930;
  --gold:#c8973a;--gold2:#e8b44a;--gold3:#f7c96b;
  --red:#e84c3d;--green:#3dbe7a;--blue:#4299e1;--purple:#9f7aea;--cyan:#38bdf8;
  --text:#dce4f5;--muted:#6b7a99;--dim:#2d3554;
  --carry:#e8b44a;--mid:#4299e1;--off:#e84c3d;--sup:#3dbe7a;--hard:#9f7aea;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);--b3:rgba(255,255,255,.18);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(100,120,200,.2);border-radius:2px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 50% at 15% 5%,rgba(66,153,225,.05) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 90%,rgba(159,122,234,.04) 0%,transparent 60%)}
.app{display:flex;flex-direction:column;height:100vh;position:relative}
/* HEADER */
.hdr{position:relative;z-index:10;flex-shrink:0;height:56px;background:rgba(10,13,26,.97);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;padding:0 20px;gap:0}
.hdr::after{content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(200,151,58,.4),transparent)}
.logo{font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;letter-spacing:5px;text-transform:uppercase;background:linear-gradient(135deg,#f7c96b,#c8973a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:10px}
.logo em{background:linear-gradient(135deg,rgba(220,228,245,.85),rgba(220,228,245,.45));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;font-weight:300}
.patch{background:rgba(200,151,58,.12);border:1px solid rgba(200,151,58,.28);color:var(--gold2);font-size:9px;font-weight:600;padding:3px 8px;border-radius:3px;letter-spacing:2px;text-transform:uppercase;margin-right:16px}
.sep{width:1px;height:26px;background:var(--b2);margin:0 12px}
.nav{display:flex;gap:2px}
.ntab{position:relative;background:transparent;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;padding:7px 16px;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.ntab:hover{color:var(--text);background:rgba(255,255,255,.04)}
.ntab.on{color:var(--gold2);background:rgba(200,151,58,.1)}
.ntab.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);border-radius:1px}
.ntab-ic{font-size:13px}
.nbadge{background:rgba(200,151,58,.2);color:var(--gold);font-size:9px;padding:2px 6px;border-radius:8px;min-width:18px;text-align:center}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted)}
.live{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
/* LAYOUT */
.body{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}
/* SIDEBAR */
.side{width:256px;flex-shrink:0;background:rgba(10,13,26,.9);border-right:1px solid var(--b1);display:flex;flex-direction:column}
.side-top{padding:10px 12px 0;flex-shrink:0}
.srch{position:relative;margin-bottom:7px}
.srch input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b1);color:var(--text);font-family:'Outfit',sans-serif;font-size:12px;padding:8px 10px 8px 30px;border-radius:7px;outline:none;transition:all .2s}
.srch input:focus{border-color:rgba(200,151,58,.35);background:rgba(255,255,255,.07)}
.srch input::placeholder{color:var(--muted)}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.roles{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.rb{background:rgba(255,255,255,.04);border:1px solid var(--b1);color:var(--muted);font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s;letter-spacing:.5px;text-transform:uppercase}
.rb:hover{color:var(--text)}
.rb.ra{background:rgba(200,151,58,.1);border-color:rgba(200,151,58,.3);color:var(--gold2)}
.rb.rc{background:rgba(232,180,74,.08);border-color:rgba(232,180,74,.25);color:var(--carry)}
.rb.rm{background:rgba(66,153,225,.08);border-color:rgba(66,153,225,.25);color:var(--mid)}
.rb.ro{background:rgba(232,76,61,.08);border-color:rgba(232,76,61,.25);color:var(--off)}
.rb.rs{background:rgba(61,190,122,.08);border-color:rgba(61,190,122,.25);color:var(--sup)}
.rb.rh{background:rgba(159,122,234,.08);border-color:rgba(159,122,234,.25);color:var(--hard)}
.scnt{display:flex;justify-content:space-between;padding:4px 1px 7px;border-bottom:1px solid var(--b1);margin-bottom:3px;font-size:10px;color:var(--muted)}
.scnt b{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--gold2)}
.hlist{flex:1;overflow-y:auto;padding:3px 5px 8px}
/* hero row */
.hr{display:flex;align-items:center;border-radius:7px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:2px;overflow:hidden;position:relative}
.hr:hover{background:rgba(255,255,255,.04);border-color:var(--b1)}
.hr.se{background:rgba(232,76,61,.07);border-color:rgba(232,76,61,.2)}
.hr.sa{background:rgba(61,190,122,.07);border-color:rgba(61,190,122,.2)}
.hr.sm{background:rgba(200,151,58,.07);border-color:rgba(200,151,58,.2)}
.hr-bar{width:2px;position:absolute;left:0;top:0;bottom:0;border-radius:0 1px 1px 0}
/* PORTRAIT — uses _lg.png from cdn */
.hr-port{width:48px;height:36px;flex-shrink:0;overflow:hidden;background:var(--bg3)}
.hr-port img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block;transition:transform .25s}
.hr:hover .hr-port img{transform:scale(1.08)}
.hr-body{flex:1;min-width:0;padding:0 7px}
.hr-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hr-role{font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.hr-wr{font-size:11px;font-weight:600;flex-shrink:0;padding-right:5px}
.hr-tier{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;flex-shrink:0;width:17px;padding-right:7px;text-align:center}
/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.panel{display:none;flex:1;flex-direction:column;overflow:hidden;animation:pi .2s ease}
.panel.on{display:flex}
@keyframes pi{from{opacity:0;transform:translateX(4px)}to{opacity:1;transform:translateX(0)}}
/* META */
.mv{flex:1;overflow-y:auto;padding:16px 18px}
.tblock{margin-bottom:24px;animation:fu .3s ease both}
.tblock:nth-child(1){animation-delay:.04s}.tblock:nth-child(2){animation-delay:.1s}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.thdr{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:9px;margin-bottom:12px;border-left:3px solid}
.t-S{background:linear-gradient(90deg,rgba(255,107,53,.1),transparent);border-color:#ff6b35}
.t-A{background:linear-gradient(90deg,rgba(232,180,74,.08),transparent);border-color:var(--gold2)}
.tpill{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:7px;border:1px solid;flex-shrink:0}
.tpS{color:#ff6b35;border-color:rgba(255,107,53,.3);background:rgba(255,107,53,.1)}
.tpA{color:var(--gold2);border-color:rgba(232,180,74,.3);background:rgba(232,180,74,.1)}
.ti{flex:1}.tn{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600}.ts{font-size:11px;color:var(--muted);margin-top:1px}
.tavg{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--green)}
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px}
/* HERO CARD with _lg portrait */
.hcard{background:var(--bg3);border:1px solid var(--b1);border-radius:11px;overflow:hidden;cursor:pointer;transition:all .22s;position:relative}
.hcard:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.5)}
.hcard-img{height:108px;position:relative;overflow:hidden;background:var(--bg4)}
/* key: use _lg which is 256×144 landscape */
.hcard-img img{width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block;transition:transform .4s}
.hcard:hover .hcard-img img{transform:scale(1.06)}
.hcard-over{position:absolute;inset:0;background:linear-gradient(0deg,rgba(14,18,37,1) 0%,rgba(14,18,37,.4) 55%,transparent 100%)}
.hcard-tier{position:absolute;top:8px;right:9px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;backdrop-filter:blur(12px);border:1px solid;background:rgba(0,0,0,.6)}
.hcard-body{padding:9px 11px 11px}
.hcard-name{font-size:13px;font-weight:600;margin-bottom:2px}
.hcard-role{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.hcard-stats{display:flex;gap:5px;margin-bottom:7px}
.hs{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:5px;padding:4px 5px;text-align:center}
.hs-v{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700}.hs-l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.hcard-why{font-size:10px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* DETAIL */
.dw{flex:1;overflow-y:auto}
.di{padding:18px}
.bk{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);border:1px solid var(--b1);color:var(--muted);font-family:'Outfit',sans-serif;font-size:11px;padding:6px 13px;border-radius:5px;cursor:pointer;margin-bottom:16px;letter-spacing:.5px;transition:all .15s}
.bk:hover{color:var(--text);border-color:var(--b2)}
/* big art — uses _full.png 256x144 landscape */
.d-art{height:220px;border-radius:12px;overflow:hidden;position:relative;margin-bottom:12px;background:var(--bg3);border:1px solid var(--b1)}
.d-art img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block}
.d-art-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(6,8,15,1) 0%,rgba(6,8,15,.6) 50%,rgba(6,8,15,.1) 100%)}
.d-art-tier{position:absolute;top:12px;right:14px;font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:10px;backdrop-filter:blur(14px);border:1px solid;background:rgba(0,0,0,.65)}
.d-art-bot{position:absolute;bottom:0;left:0;right:0;padding:14px 16px}
.d-name{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;line-height:1;margin-bottom:5px}
.d-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.d-role{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
.d-tag{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid;font-weight:500}
.d-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.ds{background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:7px;padding:9px 10px;text-align:center}
.ds-v{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700}.ds-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.sbox{background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:9px;padding:12px 13px;margin-bottom:11px}
.sbt{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sbt::after{content:'';flex:1;height:1px;background:var(--b1)}
/* abilities — uses _lg icon from abilities CDN */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:8px}
.acard{background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:8px;overflow:hidden;transition:all .2s}
.acard:hover{border-color:var(--b2)}
.acard-img{height:76px;position:relative;overflow:hidden;background:var(--bg3)}
.acard-img img{width:100%;height:100%;object-fit:cover;display:block}
.acard-type{position:absolute;top:4px;right:4px;font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 5px;border-radius:3px;backdrop-filter:blur(8px)}
.acard-body{padding:7px 8px}
.acard-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px}
.acard-key{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--gold)}
.acard-desc{font-size:10px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:2px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.li{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--b1);font-size:12px}
.li:last-child{border-bottom:none}
.lid{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tw{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tp{font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid;font-weight:500}
.irow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.ic{font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid;font-weight:500;transition:transform .15s;cursor:default}
.ic:hover{transform:translateY(-1px)}
.ie{background:rgba(66,153,225,.07);border-color:rgba(66,153,225,.2);color:var(--blue)}
.ico{background:rgba(200,151,58,.08);border-color:rgba(200,151,58,.25);color:var(--gold)}
.is{background:rgba(159,122,234,.07);border-color:rgba(159,122,234,.2);color:var(--purple)}
.st{width:100%;border-collapse:collapse;font-size:12px}
.st td{padding:5px 7px;border-bottom:1px solid var(--b1)}.st tr:last-child td{border-bottom:none}
.slv{color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:700;width:65px}
.tip{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid var(--b1);font-size:12px;line-height:1.6;align-items:flex-start}
.tip:last-child{border-bottom:none}
.tipic{color:var(--gold);flex-shrink:0;font-size:10px;margin-top:3px}
.aask{width:100%;margin-top:13px;background:linear-gradient(135deg,rgba(200,151,58,.12),rgba(200,151,58,.04));border:1px solid rgba(200,151,58,.28);color:var(--gold2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:12px;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.aask:hover{background:linear-gradient(135deg,rgba(200,151,58,.2),rgba(200,151,58,.08));border-color:rgba(200,151,58,.5);box-shadow:0 0 20px rgba(200,151,58,.15)}
/* ZONES */
.tz{flex-shrink:0;padding:12px 18px;background:rgba(10,13,26,.92);border-bottom:1px solid var(--b1);backdrop-filter:blur(16px)}
.ztitle{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.ztitle::after{content:'';flex:1;height:1px;background:var(--b1)}
.zrow{display:flex;align-items:center;gap:10px}
.slots{display:flex;gap:6px}
.eslot,.aslot{width:54px;height:54px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;flex-shrink:0}
.eslot{background:rgba(232,76,61,.04);border:1.5px dashed rgba(232,76,61,.2)}
.eslot:hover{border-color:rgba(232,76,61,.45)}
.eslot.on{border-style:solid;border-color:rgba(232,76,61,.35);background:rgba(232,76,61,.07)}
.aslot{background:rgba(61,190,122,.04);border:1.5px dashed rgba(61,190,122,.2)}
.aslot:hover{border-color:rgba(61,190,122,.45)}
.aslot.on{border-style:solid;border-color:rgba(61,190,122,.35);background:rgba(61,190,122,.07)}
.eslot img,.aslot img{width:100%;height:100%;object-fit:cover;object-position:center 20%;border-radius:7px}
.sph{color:rgba(255,255,255,.12);font-size:20px;line-height:1}
.slbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.78);font-size:7px;text-align:center;padding:2px;color:var(--text)}
.sx{position:absolute;top:2px;right:2px;width:13px;height:13px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:8px;color:#fff;cursor:pointer;z-index:3}
.eslot.on:hover .sx{display:flex;background:var(--red)}
.aslot.on:hover .sx{display:flex;background:var(--green)}
.aibtn{margin-left:auto;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;padding:9px 18px;border-radius:7px;cursor:pointer;transition:all .2s;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;white-space:nowrap;border:1px solid}
.aibtn.g{background:linear-gradient(135deg,rgba(200,151,58,.18),rgba(200,151,58,.07));border-color:rgba(200,151,58,.4);color:var(--gold2)}
.aibtn.g:hover{background:linear-gradient(135deg,rgba(200,151,58,.28),rgba(200,151,58,.12));box-shadow:0 0 20px rgba(200,151,58,.2)}
.aibtn.t{background:linear-gradient(135deg,rgba(61,190,122,.15),rgba(61,190,122,.06));border-color:rgba(61,190,122,.4);color:var(--green)}
.aibtn.t:hover{background:linear-gradient(135deg,rgba(61,190,122,.25),rgba(61,190,122,.1));box-shadow:0 0 20px rgba(61,190,122,.15)}
.aibtn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.sp{width:11px;height:11px;border:2px solid rgba(255,255,255,.15);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.rs{flex:1;overflow-y:auto;padding:16px 18px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:11px;padding:36px;text-align:center}
.ei{font-size:38px;opacity:.18}.et{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:600;color:var(--dim)}.ep{font-size:12px;color:var(--muted);max-width:240px;line-height:1.65}
.rh{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--b1)}
.rht{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.ecs{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto}
.ec{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.05);border:1px solid var(--b1);border-radius:5px;padding:2px 6px 2px 3px;font-size:10px}
.ec img{width:16px;height:12px;border-radius:2px;object-fit:cover;object-position:center 20%}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:8px;margin-bottom:14px}
.cc{background:var(--bg3);border:1px solid var(--b1);border-radius:9px;overflow:hidden;transition:all .2s}
.cc:hover{border-color:var(--b2);transform:translateY(-1px)}
.cc-img{height:82px;position:relative;overflow:hidden;background:var(--bg4)}
.cc-img img{width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block}
.cc-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(14,18,37,.9) 0%,transparent 70%)}

const ALL_HEROES = [...HEROES, ...MORE];

const RL={carry:'Carry',mid:'Mid',off:'Offlane',support:'Support',hard:'Hard Sup'};
const RC={carry:'var(--carry)',mid:'var(--mid)',off:'var(--off)',support:'var(--sup)',hard:'var(--hard)'};
const TC={S:'#ff6b35',A:'var(--gold2)',B:'var(--green)',C:'var(--muted)'};
const ATC={Active:'rgba(66,153,225,.15)',Passive:'rgba(159,122,234,.15)',Toggle:'rgba(61,190,122,.15)',Ultimate:'rgba(232,76,61,.18)'};
const ATT={Active:'var(--blue)',Passive:'var(--purple)',Toggle:'var(--green)',Ultimate:'var(--red)'};

let curTab='meta', curRole='all', detailId=null, buildId=null;
let enemies=[], allies=[];

const rc=r=>RC[r]||'#888';
const tc=t=>TC[t]||'var(--muted)';
// Use _lg.png for landscape portraits
const HLG = id => `https://api.opendota.com/apps/dota2/images/heroes/${id}_lg.png`;
const HFULL = id => `https://api.opendota.com/apps/dota2/images/heroes/${id}_full.png`;

function imgEl(src, w, h, pos, fb, fbStyle){
  pos = pos||'center 20%';
  return `<img src="${src}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;object-position:${pos};display:block" onerror="this.style.display='none';var n=this.nextElementSibling;if(n){n.style.display='flex'}">${fb?`<div style="${fbStyle||''}display:none;width:100%;height:100%;align-items:center;justify-content:center;font-size:24px">${fb}</div>`:''}`;
}

function rSide(){
  const q=document.getElementById('sq').value.toLowerCase();
  const list=ALL_HEROES.filter(h=>(curRole==='all'||h.role===curRole)&&(!q||h.name.toLowerCase().includes(q)))
    .sort((a,b)=>({'S':0,'A':1,'B':2,'C':3}[a.tier]-{'S':0,'A':1,'B':2,'C':3}[b.tier])||b.wr-a.wr);
  document.getElementById('hcnt').textContent=list.length;
  document.getElementById('hlist').innerHTML=list.map(h=>{
    let cls='hr';
    if(enemies.includes(h.id))cls+=' se';
    else if(allies.includes(h.id))cls+=' sa';
    else if(detailId===h.id||buildId===h.id)cls+=' sm';
    const c=rc(h.role),tclr=tc(h.tier),wrc=h.wr>=54?'var(--green)':h.wr>=52?'var(--gold2)':'var(--muted)';
    const bar=enemies.includes(h.id)?'var(--red)':allies.includes(h.id)?'var(--green)':(detailId===h.id||buildId===h.id)?'var(--gold2)':'transparent';
    return `<div class="${cls}" onclick="clickH('${h.id}')">
      <span class="hr-bar" style="background:${bar}"></span>
      <div class="hr-port" style="background:${c}18">
        ${imgEl(HLG(h.id),48,36,'center 20%',h.e,`background:${c}18;color:${c};`)}
      </div>
      <div class="hr-body"><div class="hr-name">${h.name}</div><div class="hr-role" style="color:${c}">${RL[h.role]}</div></div>
      <div class="hr-wr" style="color:${wrc}">${h.wr}%</div>
      <div class="hr-tier" style="color:${tclr}">${h.tier}</div>
    </div>`;
  }).join('');
}

function sRole(btn){
  document.querySelectorAll('.rb').forEach(b=>b.className='rb');
  const r=btn.dataset.r,m={all:'ra',carry:'rc',mid:'rm',off:'ro',support:'rs',hard:'rh'};
  btn.className='rb '+(m[r]||'ra');
  curRole=r;rSide();
}

function clickH(id){
  if(curTab==='counter'){addE(id);return;}
  if(curTab==='synergy'){addA(id);return;}
  if(curTab==='build'){showBuild(id);return;}
  showDet(id);
}

function goTab(t,btn){
  curTab=t;
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+t).classList.add('on');
  rSide();
}

// ── META ──
function renderMeta(){
  const el=document.getElementById('mscroll');
  const tiers=['S','A'];
  const tn={S:'S Tier — Overpowered',A:'A Tier — Сильные'};
  const ts={S:'Должны быть забанены или пикнуты · 7.40c',A:'Очень сильные, высокий winrate'};
  let html='';
  tiers.forEach(t=>{
    const hs=ALL_HEROES.filter(h=>h.tier===t).sort((a,b)=>b.wr-a.wr);
    if(!hs.length)return;
    const avg=(hs.reduce((s,h)=>s+h.wr,0)/hs.length).toFixed(1);
    html+=`<div class="tblock"><div class="thdr t-${t}">
      <div class="tpill tp${t}">${t}</div>
      <div class="ti"><div class="tn">${tn[t]}</div><div class="ts">${ts[t]} · ${hs.length} героев</div></div>
      <div class="tavg">avg ${avg}% WR</div>
    </div><div class="hgrid">`;
    hs.forEach(h=>{
      const c=rc(h.role),tclr=tc(h.tier),wrc=h.wr>=54?'var(--green)':h.wr>=52?'var(--gold2)':'var(--muted)';
      html+=`<div class="hcard" onclick="showDet('${h.id}')">
        <div class="hcard-img" style="background:${c}12">
          ${imgEl(HLG(h.id),195,108,'center 15%',h.e,`position:absolute;inset:0;background:${c}12;color:${c};font-size:40px;`)}
          <div class="hcard-over"></div>
          <div class="hcard-tier" style="color:${tclr};border-color:${tclr}44">${h.tier}</div>
        </div>
        <div class="hcard-body">
          <div class="hcard-name">${h.name}</div>
          <div class="hcard-role" style="color:${c}">${RL[h.role]}</div>
          <div class="hcard-stats">
            <div class="hs"><div class="hs-v" style="color:${wrc}">${h.wr}%</div><div class="hs-l">WR</div></div>
            <div class="hs"><div class="hs-v">${h.pick}%</div><div class="hs-l">Pick</div></div>
          </div>
          <div class="hcard-why">${h.why}</div>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html;
}

function showDet(id){
  detailId=id;
  const h=ALL_HEROES.find(x=>x.id===id);if(!h)return;
  if(curTab!=='meta')goTab('meta',document.querySelector('[data-tab="meta"]'));
  document.getElementById('mm').style.display='none';
  document.getElementById('md').style.display='flex';
  const c=rc(h.role),tclr=tc(h.tier),wrc=h.wr>=54?'var(--green)':h.wr>=52?'var(--gold2)':'var(--muted)';
  const rank=ALL_HEROES.filter(x=>x.wr>h.wr).length+1;
  const tagsHtml=(h.tags||[]).map(t=>`<span class="d-tag" style="background:${c}12;border-color:${c}30;color:${c}">${t}</span>`).join('');

    const atc=ATC[a.type]||'rgba(255,255,255,.08)',att=ATT[a.type]||'var(--muted)';

      <div class="acard-img" style="background:${c}18">

      <div class="d-art-ov"></div>
      <div class="d-art-tier" style="color:${tclr};border-color:${tclr}44">${h.tier}</div>
      <div class="d-art-bot">
        <div class="d-name">${h.name}</div>
        <div class="d-row"><span class="d-role" style="color:${c}">${RL[h.role]}</span>${tagsHtml}</div>

      <div class="ds"><div class="ds-v" style="color:${wrc}">${h.wr}%</div><div class="ds-l">Win Rate</div></div>
      <div class="ds"><div class="ds-v">${h.pick}%</div><div class="ds-l">Pick Rate</div></div>
      <div class="ds"><div class="ds-v" style="color:${tclr}">${h.tier}</div><div class="ds-l">Tier</div></div>
      <div class="ds"><div class="ds-v" style="color:var(--cyan)">#${rank}</div><div class="ds-l">WR Rank</div></div>
    </div>
    <div class="sbox"><div class="sbt">Почему в мете 7.40c</div><div style="font-size:13px;line-height:1.75">${h.why}</div></div>
    ${abilHtml.length>50?`<div class="sbox"><div class="sbt">Способности</div><div class="agrid">${abilHtml}</div></div>`:''}
    <div class="two">
      <div class="sbox" style="margin-bottom:0"><div class="sbt" style="color:var(--green)">+ Хорошо против</div>${(h.c||[]).map(n=>`<div class="li"><div class="lid" style="background:var(--green)"></div>${n}</div>`).join('')}</div>

// ── SLOTS ──
function rESlots(){
  const el=document.getElementById('eslots');el.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div'),hid=enemies[i];
    if(hid){
      const h=ALL_HEROES.find(x=>x.id===hid),c=rc(h.role);
      d.className='eslot on';
      d.innerHTML=`${imgEl(HLG(h.id),54,54,'center 15%',h.e,`position:absolute;inset:0;background:${c}18;color:${c};`)}<div class="slbl">${h.name}</div><div class="sx" onclick="event.stopPropagation();rmE('${hid}')">×</div>`;
    }else{d.className='eslot';d.innerHTML='<span class="sph">+</span>';}
    el.appendChild(d);
  }
  document.getElementById('ecnt').textContent=enemies.length;
}

function addE(id){if(enemies.includes(id)){rmE(id);return;}if(enemies.length>=5)return;enemies.push(id);rESlots();renderC();rSide();}
function rmE(id){enemies=enemies.filter(e=>e!==id);rESlots();renderC();rSide();}

function renderC(){
  const el=document.getElementById('cr');
  if(!enemies.length){el.innerHTML='<div class="empty"><div class="ei">⚔</div><div class="et">Каунтер-пикер</div><p class="ep">Кликни на героев врага в списке</p></div>';return;}
  const ehs=enemies.map(id=>ALL_HEROES.find(h=>h.id===id));
  const scores={};
  ALL_HEROES.forEach(h=>{
    if(enemies.includes(h.id))return;
    let sc=0;
    ehs.forEach(e=>{
      if((e.cb||[]).some(n=>n.toLowerCase().includes(h.name.toLowerCase().split(' ')[0].toLowerCase()))){sc+=40;}
      if((e.c||[]).some(n=>n.toLowerCase().includes(h.name.toLowerCase().split(' ')[0].toLowerCase()))){sc-=25;}
    });
    if(h.tier==='S')sc+=18;else if(h.tier==='A')sc+=10;
    scores[h.id]=sc;
  });
  const top=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,12);
  let html=`<div class="rh"><span class="rht">Топ каунтер-пики · 7.40c</span><div class="ecs">`;
  ehs.forEach(h=>{html+=`<div class="ec"><img src="${HLG(h.id)}" onerror="this.style.display='none'" alt="">${h.name}</div>`;});
  html+=`</div></div><div class="cgrid">`;
  top.forEach(([id,sc])=>{
    const h=ALL_HEROES.find(x=>x.id==id),c=rc(h.role),scn=Math.max(0,sc);
    const sclr=scn>=50?'var(--green)':scn>=25?'var(--gold2)':scn>=10?'var(--blue)':'var(--muted)';
    html+=`<div class="cc">
      <div class="cc-img" style="background:${c}12">${imgEl(HLG(h.id),188,82,'center 15%',h.e,`position:absolute;inset:0;background:${c}12;color:${c};font-size:30px;`)}<div class="cc-ov"></div></div>
      <div class="cc-body">
        <div class="cc-info"><div class="cc-name">${h.name}</div><div class="cc-sub" style="color:${c}">${RL[h.role]} · <span style="color:${tc(h.tier)}">${h.tier}</span></div></div>
        <div><div class="cc-sc" style="color:${sclr}">${scn}</div><div class="cc-wr">${h.wr}%wr</div></div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

async function doCAI(){
  if(!enemies.length)return;
  const ehs=enemies.map(id=>ALL_HEROES.find(h=>h.id===id));
  const btn=document.getElementById('cai'),sp=document.getElementById('csp'),t=document.getElementById('ct');
  btn.disabled=true;sp.style.display='block';t.textContent='Анализ...';
  const list=ehs.map(e=>`${e.name} (${RL[e.role]}, Tier ${e.tier}, ${e.wr}%WR)`).join(', ');
  const prompt=`Ты профессиональный Dota 2 аналитик. Патч 7.40c, март 2026.\n\nВражеская команда: ${list}\n\n1. Стратегия и ключевые угрозы (2-3 предложения)\n2. Топ-3 каунтер-пика с объяснением\n3. Стратегия игры — когда выигрывать\n4. Ключевые предметы против них\n\nПо-русски, конкретно.`;
  const el=document.getElementById('cr');
  const d=document.createElement('div');d.className='air';d.textContent='';el.prepend(d);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,stream:true,messages:[{role:'user',content:prompt}]})});
    const reader=r.body.getReader();const dec=new TextDecoder();let tx='';
    while(true){const{done,value}=await reader.read();if(done)break;
      for(const ln of dec.decode(value).split('\n')){if(ln.startsWith('data: ')){try{const j=JSON.parse(ln.slice(6));if(j.type==='content_block_delta'&&j.delta?.text){tx+=j.delta.text;d.textContent=tx;}}catch{}}}}
  }catch(e){d.innerHTML='<span style="color:var(--red)">Ошибка AI. Нужен API ключ в claude.ai.</span>';}
  btn.disabled=false;sp.style.display='none';t.textContent='✦ AI Анализ';
}
