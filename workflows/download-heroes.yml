name: Download Hero Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download hero images
        run: |
          mkdir -p heroes
          declare -A MAP=(
            ["antimage"]="antimage" ["axe"]="axe" ["bane"]="bane"
            ["batrider"]="batrider" ["bloodseeker"]="bloodseeker"
            ["bounty_hunter"]="bounty_hunter" ["brewmaster"]="brewmaster"
            ["bristleback"]="bristleback" ["broodmother"]="broodmother"
            ["centaur_warrunner"]="centaur_warrunner" ["chaos_knight"]="chaos_knight"
            ["chen"]="chen" ["clinkz"]="clinkz" ["rattletrap"]="rattletrap"
            ["crystal_maiden"]="crystal_maiden" ["dark_seer"]="dark_seer"
            ["dark_willow"]="dark_willow" ["dawnbreaker"]="dawnbreaker"
            ["dazzle"]="dazzle" ["death_prophet"]="death_prophet"
            ["disruptor"]="disruptor" ["doom_bringer"]="doom_bringer"
            ["dragon_knight"]="dragon_knight" ["drow_ranger"]="drow_ranger"
            ["earth_spirit"]="earth_spirit" ["earthshaker"]="earthshaker"
            ["elder_titan"]="elder_titan" ["ember_spirit"]="ember_spirit"
            ["enchantress"]="enchantress" ["enigma"]="enigma"
            ["faceless_void"]="faceless_void" ["grimstroke"]="grimstroke"
            ["gyrocopter"]="gyrocopter" ["hoodwink"]="hoodwink"
            ["huskar"]="huskar" ["invoker"]="invoker" ["io"]="wisp"
            ["jakiro"]="jakiro" ["juggernaut"]="juggernaut"
            ["keeper_of_the_light"]="keeper_of_the_light" ["kez"]="kez"
            ["kunkka"]="kunkka" ["largo"]="largo"
            ["legion_commander"]="legion_commander" ["leshrac"]="leshrac"
            ["lich"]="lich" ["life_stealer"]="life_stealer" ["lina"]="lina"
            ["lion"]="lion" ["lone_druid"]="lone_druid" ["luna"]="luna"
            ["lycan"]="lycan" ["magnataur"]="magnataur" ["marci"]="marci"
            ["mars"]="mars" ["medusa"]="medusa" ["meepo"]="meepo"
            ["mirana"]="mirana" ["monkey_king"]="monkey_king"
            ["morphling"]="morphling" ["muerta"]="muerta"
            ["naga_siren"]="naga_siren" ["nature_prophet"]="furion"
            ["necrolyte"]="necrolyte" ["nevermore"]="nevermore"
            ["night_stalker"]="night_stalker" ["nyx_assassin"]="nyx_assassin"
            ["obsidian_destroyer"]="obsidian_destroyer" ["ogre_magi"]="ogre_magi"
            ["omniknight"]="omniknight" ["oracle"]="oracle"
            ["pangolier"]="pangolier" ["phantom_assassin"]="phantom_assassin"
            ["phantom_lancer"]="phantom_lancer" ["phoenix"]="phoenix"
            ["primal_beast"]="primal_beast" ["puck"]="puck" ["pudge"]="pudge"
            ["pugna"]="pugna" ["queenofpain"]="queenofpain" ["razor"]="razor"
            ["ringmaster"]="ringmaster" ["riki"]="riki" ["rubick"]="rubick"
            ["sand_king"]="sand_king" ["shadow_demon"]="shadow_demon"
            ["shadow_shaman"]="shadow_shaman" ["shredder"]="shredder"
            ["silencer"]="silencer" ["skywrath_mage"]="skywrath_mage"
            ["slardar"]="slardar" ["slark"]="slark" ["snapfire"]="snapfire"
            ["sniper"]="sniper" ["spectre"]="spectre"
            ["spirit_breaker"]="spirit_breaker" ["storm_spirit"]="storm_spirit"
            ["sven"]="sven" ["techies"]="techies"
            ["templar_assassin"]="templar_assassin" ["terrorblade"]="terrorblade"
            ["tidehunter"]="tidehunter" ["tinker"]="tinker" ["tiny"]="tiny"
            ["treant_protector"]="treant_protector" ["troll_warlord"]="troll_warlord"
            ["tusk"]="tusk" ["abyssal_underlord"]="abyssal_underlord"
            ["undying"]="undying" ["ursa"]="ursa"
            ["vengefulspirit"]="vengefulspirit" ["venomancer"]="venomancer"
            ["viper"]="viper" ["visage"]="visage" ["void_spirit"]="void_spirit"
            ["warlock"]="warlock" ["weaver"]="weaver" ["windrunner"]="windrunner"
            ["winter_wyvern"]="winter_wyvern" ["witch_doctor"]="witch_doctor"
            ["wraith_king"]="wraith_king" ["zuus"]="zuus" ["abaddon"]="abaddon"
            ["alchemist"]="alchemist" ["ancient_apparition"]="ancient_apparition"
            ["arc_warden"]="arc_warden" ["beastmaster"]="beastmaster"
          )
          
          OK=0; FAIL=0
          for ID in "${!MAP[@]}"; do
            CDN="${MAP[$ID]}"
            URL="https://api.opendota.com/apps/dota2/images/heroes/${CDN}_lg.png"
            OUT="heroes/${ID}_lg.png"
            if [ -f "$OUT" ]; then OK=$((OK+1)); continue; fi
            HTTP=$(curl -s -o "$OUT" -w "%{http_code}" "$URL")
            if [ "$HTTP" = "200" ]; then
              OK=$((OK+1))
              echo "✓ $ID"
            else
              rm -f "$OUT"
              FAIL=$((FAIL+1))
              echo "✗ FAIL $ID ($HTTP)"
            fi
          done
          echo "Downloaded: $OK ok, $FAIL failed"

      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add heroes/
          git diff --staged --quiet || git commit -m "Add hero images"
          git push
